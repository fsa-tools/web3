image: node:20

stages:
  - install
  - check
  - build
  - publish

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

install:
  stage: install
  script:
    - npm ci

typecheck:
  stage: check
  script:
    - npm run typecheck

test:
  stage: check
  script:
    - npm test

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

publish:
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "@fsa:registry=http://avell.local:4873" > .npmrc
    - echo "//avell.local:4873/:_authToken=${VERDACCIO_TOKEN}" >> .npmrc
    - npm publish
